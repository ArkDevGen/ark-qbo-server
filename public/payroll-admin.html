<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ark Financial — Payroll Admin</title>
<style>
  :root {
    --bg: #0d1b2a; --surface: #13243a; --card: #182d45;
    --border: #243b56; --text: #e8f0f8; --muted: #6b8aaa;
    --accent: #4da6ff; --green: #4dffa0; --red: #ff5c5c;
    --orange: #ffa94d; --gold: #b8922a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }
  .logo-bar { text-align: center; padding: 24px 0 8px; }
  .logo-bar h1 { font-size: 24px; color: var(--gold); font-weight: 600; }
  .logo-bar p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 16px; }
  .card h2 { font-size: 18px; color: var(--accent); margin-bottom: 14px; font-weight: 600; }
  .card h3 { font-size: 15px; color: var(--text); margin-bottom: 10px; font-weight: 600; }

  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  input, select { width: 100%; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; }
  input:focus, select:focus { border-color: var(--accent); }

  .btn { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #0d1b2a; }
  .btn-primary:hover { background: #3d96ef; }
  .btn-green { background: var(--green); color: #0d1b2a; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .status { padding: 10px 14px; border-radius: 6px; margin-top: 10px; font-size: 13px; display: none; }
  .status.success { display: block; background: rgba(77,255,160,.1); border: 1px solid var(--green); color: var(--green); }
  .status.error { display: block; background: rgba(255,92,92,.1); border: 1px solid var(--red); color: var(--red); }
  .status.info { display: block; background: rgba(77,166,255,.1); border: 1px solid var(--accent); color: var(--accent); }

  .hidden { display: none !important; }

  /* Client list */
  .client-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: all .15s; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .client-card:hover { border-color: var(--accent); background: rgba(77,166,255,.05); }
  .client-card.active { border-color: var(--accent); background: rgba(77,166,255,.1); }
  .client-name { font-weight: 600; font-size: 14px; }
  .client-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .store-count { font-size: 12px; color: var(--accent); font-weight: 600; }

  /* Employee table */
  .emp-table { width: 100%; border-collapse: collapse; }
  .emp-table th { background: var(--surface); color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .emp-table th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .emp-table th.sortable:hover { color: var(--accent); }
  .emp-table th.sortable.active { color: var(--accent); }
  .emp-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .emp-table tr:hover { background: rgba(77,166,255,.04); }

  /* Save toast */
  #save-toast { position: fixed; bottom: 24px; right: 24px; background: var(--green); color: #0d1b2a; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 9999; }

  /* Store tabs */
  .store-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid var(--border); overflow-x: auto; }
  .store-tab { padding: 8px 18px; font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--muted); transition: all .15s; white-space: nowrap; }
  .store-tab:hover { color: var(--text); }
  .store-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Layout */
  .grid-2 { display: grid; grid-template-columns: 320px 1fr; gap: 16px; align-items: start; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Edit row */
  .edit-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .edit-row > div { flex: 1; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 500px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
  .modal h3 { color: var(--accent); margin-bottom: 14px; }
</style>
</head>
<body>

<div id="save-toast">✓ Saved</div>
<div class="container">
  <div class="logo-bar">
    <h1>Ark Financial</h1>
    <p>Payroll Employee Management</p>
  </div>

  <!-- Login -->
  <div id="screen-login">
    <div class="card" style="max-width:400px;margin:40px auto;">
      <h2>Admin Login</h2>
      <div style="margin-bottom:12px;">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username" autocomplete="username">
      </div>
      <div style="margin-bottom:12px;">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;">Sign In</button>
      <div id="login-status" class="status"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="screen-main" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="color:var(--gold);font-size:20px;">All Payroll Clients</h2>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign Out</button>
    </div>

    <div class="grid-2">
      <!-- Left: Client list -->
      <div>
        <input type="text" id="client-search" placeholder="Search clients..." oninput="renderClientList()" style="margin-bottom:12px;">
        <div id="client-list"></div>
      </div>

      <!-- Right: Client detail -->
      <div id="client-detail">
        <div class="card" style="text-align:center;padding:60px 20px;color:var(--muted);">
          <div style="font-size:32px;margin-bottom:12px;">👈</div>
          <div>Select a client to manage employees</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit Employee Modal -->
<div id="modal-edit-emp" class="modal-overlay hidden" onclick="if(event.target===this)closeEditEmp()">
  <div class="modal">
    <h3 id="edit-emp-title">Edit Employee</h3>
    <div class="edit-row">
      <div><label>First Name</label><input id="edit-emp-first"></div>
      <div><label>Last Name</label><input id="edit-emp-last"></div>
    </div>
    <div class="edit-row">
      <div><label>Position / Role</label><input id="edit-emp-position"></div>
      <div><label>Email</label><input type="email" id="edit-emp-email"></div>
    </div>
    <div class="edit-row">
      <div>
        <label>Pay Type</label>
        <select id="edit-emp-paytype" onchange="onEditPayTypeChange()">
          <option value="hourly">Hourly</option>
          <option value="salary">Salary</option>
        </select>
      </div>
      <div id="edit-hourly-wrap">
        <label>Hourly Rate</label>
        <input type="number" step="0.01" id="edit-emp-rate" placeholder="0.00">
      </div>
    </div>
    <div id="edit-salary-wrap" style="display:none;">
      <div class="edit-row">
        <div>
          <label>Annual Salary</label>
          <input type="number" step="0.01" id="edit-emp-annual" placeholder="0.00" oninput="calcPayPeriodRate()">
        </div>
        <div>
          <label>Pay Period Rate <span style="font-size:10px;color:var(--muted);">(auto-calculated)</span></label>
          <input type="number" step="0.01" id="edit-emp-period-rate" placeholder="0.00" readonly style="color:var(--green);background:rgba(77,255,160,.05);">
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeEditEmp()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEditEmp()">Save Changes</button>
    </div>
    <div id="edit-emp-status" class="status"></div>
  </div>
</div>

<script>
const API = window.location.origin;
let _token = '';
let _currentUser = null;
let _payrollData = null;
let _activeClient = null;
let _activeStore = null;
let _editingEmp = null; // { clientSlug, storeId, empIdx }
let _adminSortField = 'lastName';
let _adminSortDir = 'asc';

function setAdminSort(field) {
  if (_adminSortField === field) {
    _adminSortDir = _adminSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    _adminSortField = field;
    _adminSortDir = 'asc';
  }
  renderClientDetail();
}

function _sortIndicator(field) {
  if (_adminSortField !== field) return ' <span style="opacity:.4;">↕</span>';
  return _adminSortDir === 'asc' ? ' <span style="color:var(--accent);">↑</span>' : ' <span style="color:var(--accent);">↓</span>';
}

function _sortedWithIdx(emps) {
  const pairs = emps.map((emp, origIdx) => ({ emp, origIdx }));
  pairs.sort((a, b) => {
    const ea = a.emp, eb = b.emp;
    let va, vb;
    if (_adminSortField === 'firstName')     { va = (ea.firstName || '').toLowerCase(); vb = (eb.firstName || '').toLowerCase(); }
    else if (_adminSortField === 'lastName') { va = (ea.lastName  || '').toLowerCase(); vb = (eb.lastName  || '').toLowerCase(); }
    else if (_adminSortField === 'rate')     { va = parseFloat(ea.payRate || ea.annualRate) || 0; vb = parseFloat(eb.payRate || eb.annualRate) || 0; }
    if (va < vb) return _adminSortDir === 'asc' ? -1 : 1;
    if (va > vb) return _adminSortDir === 'asc' ?  1 : -1;
    return 0;
  });
  return pairs;
}

let _saveToastTimer = null;
function showSaveToast() {
  const t = document.getElementById('save-toast');
  if (!t) return;
  t.style.opacity = '1';
  clearTimeout(_saveToastTimer);
  _saveToastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

// ─── Login ───────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const statusEl = document.getElementById('login-status');
  if (!username || !password) { statusEl.className = 'status error'; statusEl.textContent = 'Enter username and password'; return; }

  try {
    const resp = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // Check role — only admin and AM can access
    const role = data.user?.role || 'viewer';
    if (role === 'viewer') throw new Error('Insufficient permissions — viewers cannot access payroll admin');
    // PM can access but read-only for employee edits (future: add edit approval flow)
    _currentUser = data.user;
    _token = data.token;

    // Load payroll data
    const prResp = await fetch(`${API}/payroll/admin/data`, {
      headers: { 'Authorization': `Bearer ${_token}` },
    });
    _payrollData = await prResp.json();

    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-main').classList.remove('hidden');
    renderClientList();
  } catch (e) {
    statusEl.className = 'status error';
    statusEl.textContent = e.message;
  }
}

document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  _token = '';
  _payrollData = null;
  _activeClient = null;
  document.getElementById('screen-main').classList.add('hidden');
  document.getElementById('screen-login').classList.remove('hidden');
  document.getElementById('login-key').value = '';
  document.getElementById('login-status').className = 'status';
}

// ─── Client List ─────────────────────────────────────────────────
function renderClientList() {
  const q = (document.getElementById('client-search')?.value || '').toLowerCase();
  const listEl = document.getElementById('client-list');
  if (!_payrollData?.clients) { listEl.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center;">No payroll clients found</div>'; return; }

  let clients = Object.entries(_payrollData.clients)
    .map(([slug, data]) => ({ slug, ...data }));

  // All roles can see all clients — assigned clients are just for AM relationship tracking

  clients = clients
    .filter(c => !q || c.name?.toLowerCase().includes(q) || c.slug?.toLowerCase().includes(q))
    .sort((a, b) => (a.name || a.slug).localeCompare(b.name || b.slug));

  listEl.innerHTML = clients.map(c => {
    const storeCount = Object.keys(c.stores || {}).filter(s => s !== 'admin').length;
    const empCount = Object.values(c.stores || {}).reduce((sum, s) => sum + (s.employees?.length || 0), 0);
    const active = _activeClient?.slug === c.slug ? ' active' : '';
    return `<div class="client-card${active}" onclick="selectClient('${c.slug}')">
      <div>
        <div class="client-name">${c.name || c.slug}</div>
        <div class="client-meta">${c.slug} · ${c.payFrequency || 'No schedule'}</div>
      </div>
      <div style="text-align:right;">
        <div class="store-count">${storeCount} store${storeCount !== 1 ? 's' : ''}</div>
        <div style="font-size:11px;color:var(--muted);">${empCount} employees</div>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--muted);padding:20px;text-align:center;">No matches</div>';
}

// ─── Client Detail ───────────────────────────────────────────────
function selectClient(slug) {
  _activeClient = { slug, ..._payrollData.clients[slug] };
  _activeStore = null;
  renderClientList();
  renderClientDetail();
}

function renderClientDetail() {
  const c = _activeClient;
  if (!c) return;

  const detailEl = document.getElementById('client-detail');
  const stores = Object.entries(c.stores || {}).filter(([id]) => id !== 'admin');
  const adminStore = c.stores?.admin;

  // Build store tabs
  const storeTabs = stores.map(([id, s]) =>
    `<div class="store-tab${_activeStore === id ? ' active' : ''}" onclick="selectStore('${id}')">${s.name || 'Store ' + id}</div>`
  ).join('');

  // If no store selected, select first
  if (!_activeStore && stores.length) {
    _activeStore = stores[0][0];
  }

  const currentStore = c.stores?.[_activeStore];
  const adminEmps = adminStore?.employees || [];
  const storeEmps = currentStore?.employees || [];

  detailEl.innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <h2 style="margin-bottom:0;">${c.name || c.slug}</h2>
        <span style="font-size:12px;color:var(--muted);font-family:monospace;">${c.slug}</span>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">
        ${c.payFrequency || 'No pay schedule'} · ${stores.length} store${stores.length !== 1 ? 's' : ''}
        ${c.password ? ' · <span style="color:var(--green);">Password set</span>' : ' · <span style="color:var(--red);">No password</span>'}
      </div>

      ${stores.length > 1 ? `<div class="store-tabs">${storeTabs}</div>` : stores.length === 1 ? `<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px;">${stores[0][1].name || 'Store ' + stores[0][0]}</div>` : ''}

      ${adminEmps.length ? `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Admin / Company-Wide (${adminEmps.length})</div>
          <button class="btn btn-outline btn-sm" onclick="showAddEmp('${c.slug}','admin')" style="border-color:var(--green);color:var(--green);">+ Add Admin</button>
        </div>
        <table class="emp-table" style="margin-bottom:16px;">
          <thead><tr>
            <th class="sortable${_adminSortField==='firstName'?' active':''}" onclick="setAdminSort('firstName')">First Name${_sortIndicator('firstName')}</th>
            <th class="sortable${_adminSortField==='lastName'?' active':''}" onclick="setAdminSort('lastName')">Last Name${_sortIndicator('lastName')}</th>
            <th>Position</th><th>Pay Type</th>
            <th class="sortable${_adminSortField==='rate'?' active':''}" onclick="setAdminSort('rate')">Rate${_sortIndicator('rate')}</th>
            <th>Actions</th>
          </tr></thead>
          <tbody>
            ${_sortedWithIdx(adminEmps).map(({emp, origIdx}) => `<tr>
              <td style="font-weight:500;">${emp.firstName}</td>
              <td style="font-weight:500;">${emp.lastName}</td>
              <td style="color:var(--muted);">${emp.position || '—'}</td>
              <td><span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;${emp.payType === 'salary' ? 'background:rgba(77,166,255,.15);color:var(--accent);' : 'background:rgba(255,169,77,.15);color:var(--orange);'}">${emp.payType === 'salary' ? 'Salary' : 'Hourly'}</span></td>
              <td style="font-family:monospace;">${fmtPayRate(emp)}</td>
              <td>
                <button class="btn btn-outline btn-sm" onclick="editEmp('${c.slug}','admin',${origIdx})">Edit</button>
                <button class="btn btn-red btn-sm" onclick="deleteEmp('${c.slug}','admin',${origIdx},'${emp.firstName} ${emp.lastName}')">✕</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      ` : ''}

      ${_activeStore && currentStore ? `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">
            ${currentStore.name || 'Store ' + _activeStore} Employees (${storeEmps.length})
          </div>
          <button class="btn btn-outline btn-sm" onclick="showAddEmp('${c.slug}','${_activeStore}')" style="border-color:var(--green);color:var(--green);">+ Add Employee</button>
        </div>
        ${storeEmps.length ? `
          <table class="emp-table">
            <thead><tr>
              <th class="sortable${_adminSortField==='firstName'?' active':''}" onclick="setAdminSort('firstName')">First Name${_sortIndicator('firstName')}</th>
              <th class="sortable${_adminSortField==='lastName'?' active':''}" onclick="setAdminSort('lastName')">Last Name${_sortIndicator('lastName')}</th>
              <th>Position</th><th>Pay Type</th>
              <th class="sortable${_adminSortField==='rate'?' active':''}" onclick="setAdminSort('rate')">Rate${_sortIndicator('rate')}</th>
              <th>Email</th><th>Actions</th>
            </tr></thead>
            <tbody>
              ${_sortedWithIdx(storeEmps).map(({emp, origIdx}) => `<tr>
                <td style="font-weight:500;">${emp.firstName}</td>
                <td style="font-weight:500;">${emp.lastName}</td>
                <td style="color:var(--muted);">${emp.position || '—'}</td>
                <td><span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;${emp.payType === 'salary' ? 'background:rgba(77,166,255,.15);color:var(--accent);' : 'background:rgba(255,169,77,.15);color:var(--orange);'}">${emp.payType === 'salary' ? 'Salary' : 'Hourly'}</span></td>
                <td style="font-family:monospace;">${fmtPayRate(emp)}</td>
                <td style="color:var(--muted);font-size:12px;">${emp.email || '—'}</td>
                <td>
                  <button class="btn btn-outline btn-sm" onclick="editEmp('${c.slug}','${_activeStore}',${origIdx})">Edit</button>
                  <button class="btn btn-red btn-sm" onclick="deleteEmp('${c.slug}','${_activeStore}',${origIdx},'${emp.firstName} ${emp.lastName}')">✕</button>
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        ` : '<div style="color:var(--muted);padding:20px;text-align:center;">No employees in this store</div>'}
      ` : ''}
    </div>
  `;
}

function selectStore(storeId) {
  _activeStore = storeId;
  renderClientDetail();
}

// ─── Pay rate formatting ─────────────────────────────────────────
function fmtPayRate(emp) {
  if (emp.payType === 'salary') {
    const annual = emp.annualRate ? '$' + parseFloat(emp.annualRate).toLocaleString('en-US', { minimumFractionDigits: 2 }) + '/yr' : '';
    const period = emp.periodRate ? '$' + parseFloat(emp.periodRate).toFixed(2) + '/pp' : '';
    if (annual && period) return `${annual}<br><span style="font-size:11px;color:var(--green);">${period}</span>`;
    if (annual) return annual;
    if (emp.payRate) return '$' + parseFloat(emp.payRate).toFixed(2) + '/yr';
    return '—';
  }
  return emp.payRate ? '$' + parseFloat(emp.payRate).toFixed(2) + '/hr' : '—';
}

function onEditPayTypeChange() {
  const payType = document.getElementById('edit-emp-paytype').value;
  document.getElementById('edit-hourly-wrap').style.display = payType === 'hourly' ? '' : 'none';
  document.getElementById('edit-salary-wrap').style.display = payType === 'salary' ? '' : 'none';
}

function calcPayPeriodRate() {
  const annual = parseFloat(document.getElementById('edit-emp-annual').value) || 0;
  // Determine pay periods from client's pay frequency
  const client = _activeClient;
  let periods = 26; // default biweekly
  const freq = (client?.payFrequency || '').toLowerCase();
  if (freq.includes('weekly') && !freq.includes('bi')) periods = 52;
  else if (freq.includes('bi-weekly') || freq.includes('biweekly') || freq.includes('bi weekly')) periods = 26;
  else if (freq.includes('semi-monthly') || freq.includes('semimonthly')) periods = 24;
  else if (freq.includes('monthly') && !freq.includes('semi')) periods = 12;

  const periodRate = annual > 0 ? (annual / periods) : 0;
  document.getElementById('edit-emp-period-rate').value = periodRate > 0 ? periodRate.toFixed(2) : '';
}

// ─── Edit Employee ───────────────────────────────────────────────
function editEmp(clientSlug, storeId, empIdx) {
  const emp = _payrollData.clients[clientSlug]?.stores?.[storeId]?.employees?.[empIdx];
  if (!emp) return;

  _editingEmp = { clientSlug, storeId, empIdx };
  document.getElementById('edit-emp-title').textContent = `Edit: ${emp.firstName} ${emp.lastName}`;
  document.getElementById('edit-emp-first').value = emp.firstName || '';
  document.getElementById('edit-emp-last').value = emp.lastName || '';
  document.getElementById('edit-emp-position').value = emp.position || '';
  document.getElementById('edit-emp-paytype').value = emp.payType || 'hourly';
  document.getElementById('edit-emp-rate').value = emp.payRate || '';
  document.getElementById('edit-emp-annual').value = emp.annualRate || '';
  document.getElementById('edit-emp-period-rate').value = emp.periodRate || '';
  document.getElementById('edit-emp-email').value = emp.email || '';
  document.getElementById('edit-emp-status').className = 'status';
  onEditPayTypeChange();
  document.getElementById('modal-edit-emp').classList.remove('hidden');
}

function closeEditEmp() {
  document.getElementById('modal-edit-emp').classList.add('hidden');
  _editingEmp = null;
}

// ─── Add Employee (from admin) ────────────────────────────────────
function showAddEmp(clientSlug, storeId) {
  _editingEmp = { clientSlug, storeId, empIdx: -1 }; // -1 = new
  document.getElementById('edit-emp-title').textContent = 'Add New Employee';
  document.getElementById('edit-emp-first').value = '';
  document.getElementById('edit-emp-last').value = '';
  document.getElementById('edit-emp-position').value = '';
  document.getElementById('edit-emp-paytype').value = 'hourly';
  document.getElementById('edit-emp-rate').value = '';
  document.getElementById('edit-emp-annual').value = '';
  document.getElementById('edit-emp-period-rate').value = '';
  document.getElementById('edit-emp-email').value = '';
  document.getElementById('edit-emp-status').className = 'status';
  onEditPayTypeChange();
  document.getElementById('modal-edit-emp').classList.remove('hidden');
}

async function saveEditEmp() {
  if (!_editingEmp) return;
  const { clientSlug, storeId, empIdx } = _editingEmp;
  const statusEl = document.getElementById('edit-emp-status');
  const isNew = empIdx === -1;

  const payType = document.getElementById('edit-emp-paytype').value;
  const updates = {
    firstName: document.getElementById('edit-emp-first').value.trim(),
    lastName: document.getElementById('edit-emp-last').value.trim(),
    position: document.getElementById('edit-emp-position').value.trim(),
    payType,
    payRate: payType === 'hourly' ? document.getElementById('edit-emp-rate').value.trim() : '',
    annualRate: payType === 'salary' ? document.getElementById('edit-emp-annual').value.trim() : '',
    periodRate: payType === 'salary' ? document.getElementById('edit-emp-period-rate').value.trim() : '',
    email: document.getElementById('edit-emp-email').value.trim(),
  };

  if (!updates.firstName || !updates.lastName) {
    statusEl.className = 'status error';
    statusEl.textContent = 'First and last name required';
    return;
  }

  try {
    statusEl.className = 'status info';
    statusEl.textContent = isNew ? 'Adding...' : 'Saving...';

    if (isNew) {
      const resp = await fetch(`${API}/payroll/admin/employee`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token}` },
        body: JSON.stringify({ clientSlug, storeId, employee: updates }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      // Update local data
      if (!_payrollData.clients[clientSlug].stores[storeId].employees) {
        _payrollData.clients[clientSlug].stores[storeId].employees = [];
      }
      _payrollData.clients[clientSlug].stores[storeId].employees.push(data.employee);
    } else {
      const resp = await fetch(`${API}/payroll/admin/employee`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token}` },
        body: JSON.stringify({ clientSlug, storeId, empIdx, updates }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      // Update local data
      const emp = _payrollData.clients[clientSlug].stores[storeId].employees[empIdx];
      Object.assign(emp, updates);
    }

    closeEditEmp();
    renderClientDetail();
    renderClientList(); // Update employee count
    showSaveToast();
  } catch (e) {
    statusEl.className = 'status error';
    statusEl.textContent = e.message;
  }
}

async function deleteEmp(clientSlug, storeId, empIdx, empName) {
  if (!confirm(`Remove ${empName} from this store?`)) return;

  try {
    const resp = await fetch(`${API}/payroll/admin/employee`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token}` },
      body: JSON.stringify({ clientSlug, storeId, empIdx }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // Update local data
    _payrollData.clients[clientSlug].stores[storeId].employees.splice(empIdx, 1);
    renderClientDetail();
    showSaveToast();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
</script>
